# Deploy the Diversio Engineering website to Cloudflare Pages.
#
# First principles:
# - production should publish automatically from merges to main
# - preview deploys should exist for reviewable PRs from this repository
# - the site build depends on source docs from agent-skills-marketplace,
#   which is checked out at a pinned SHA during the build
# - repository_dispatch from agent-skills-marketplace triggers production
#   deploys with the exact merged SHA
# - keep the workflow repo-local and explicit; Cloudflare project creation,
#   secrets, and custom-domain mapping are one-time setup steps
#
# Safety rules for manual dispatch:
# - manual preview deploys may run from any selected ref
# - manual production deploys must only run from main
# - do not let a workflow_dispatch from a feature branch publish to production
#
# Source resolution:
# - checks out agent-skills-marketplace at the SHA from agent-skills-source.ref
#   (for PR previews and manual dispatches) or from the repository_dispatch payload
#   (for ASM-triggered production deploys)
# - copies marketplace.json from the ASM checkout before building
# - sets AGENT_SKILLS_REPO_DIR so site-docs.ts extraction finds the right source files
name: Deploy Website to Cloudflare Pages

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "docs/**"
      - "site.config.mjs"
      - "astro.config.mjs"
      - "package.json"
      - "tsconfig.json"
      - "agent-skills-source.ref"
      - ".github/workflows/deploy-website-cloudflare-pages.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "docs/**"
      - "site.config.mjs"
      - "astro.config.mjs"
      - "package.json"
      - "tsconfig.json"
      - "agent-skills-source.ref"
      - ".github/workflows/deploy-website-cloudflare-pages.yml"
  repository_dispatch:
    types:
      - asm-content-updated
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Which environment to deploy manually"
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      preview_branch:
        description: "Optional preview branch alias override. Leave blank to use the selected GitHub ref name."
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  # Keep the project name configurable so the workflow can be reused across
  # environments without rewriting the YAML.
  CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'diversio-engineering' }}

jobs:
  # ── Preview deploys ──────────────────────────────────────────────────────
  # Limited to same-repo PRs because forked PRs do not receive repository
  # secrets. That keeps the workflow safe and avoids noisy failures
  # contributors cannot fix from forks.
  deploy-preview:
    name: Deploy preview
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'preview')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: cloudflare-pages
    concurrency:
      group: deploy-preview-${{ github.event.pull_request.number || github.ref_name }}
      cancel-in-progress: true
    steps:
      - name: Checkout engineering-website
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read ASM source SHA
        id: asm-sha
        shell: bash
        run: |
          sha=$(cat agent-skills-source.ref | tr -d '[:space:]')
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "Building preview with agent-skills-marketplace SHA: ${sha}"

      - name: Checkout agent-skills-marketplace
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: DiversioTeam/agent-skills-marketplace
          ref: ${{ steps.asm-sha.outputs.sha }}
          path: vendor/agent-skills-marketplace
          fetch-depth: 1
          persist-credentials: false

      - name: Copy marketplace.json from ASM checkout
        shell: bash
        run: |
          set -euo pipefail
          cp vendor/agent-skills-marketplace/website/src/data/marketplace.json src/data/marketplace.json
          echo "marketplace.json synced from ASM checkout"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm install --package-lock=false

      - name: Build website
        shell: bash
        env:
          AGENT_SKILLS_REPO_DIR: ${{ github.workspace }}/vendor/agent-skills-marketplace
        run: |
          set -euo pipefail
          npm run build

      - name: Deploy preview to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MANUAL_PREVIEW_BRANCH: ${{ github.event.inputs.preview_branch }}
        shell: bash
        run: |
          set -euo pipefail
          branch="${GITHUB_HEAD_REF:-}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            branch="${MANUAL_PREVIEW_BRANCH:-${GITHUB_REF_NAME}}"
          fi
          npx --yes wrangler@4.15.2 pages deploy dist \
            --project-name="${CLOUDFLARE_PAGES_PROJECT}" \
            --branch="${branch}"

  # ── Production deploys ───────────────────────────────────────────────────
  # Production only from main (push) or from an agent-skills-marketplace
  # repository_dispatch with an exact SHA. Manual dispatch only allowed
  # from the main branch.
  deploy-production:
    name: Deploy production
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'repository_dispatch' && github.event.action == 'asm-content-updated') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'production' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: cloudflare-pages
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout engineering-website
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine ASM SHA for production
        id: asm-sha
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "repository_dispatch" ]]; then
            # repository_dispatch from ASM carries the exact merged SHA
            sha="${{ github.event.client_payload.sha }}"
            echo "Using SHA from repository_dispatch: ${sha}"
          else
            # Push to main or manual dispatch: use lock file
            sha=$(cat agent-skills-source.ref | tr -d '[:space:]')
            echo "Using SHA from lock file: ${sha}"
          fi
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Checkout agent-skills-marketplace
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: DiversioTeam/agent-skills-marketplace
          ref: ${{ steps.asm-sha.outputs.sha }}
          path: vendor/agent-skills-marketplace
          fetch-depth: 1
          persist-credentials: false

      - name: Copy marketplace.json from ASM checkout
        shell: bash
        run: |
          set -euo pipefail
          cp vendor/agent-skills-marketplace/website/src/data/marketplace.json src/data/marketplace.json
          echo "marketplace.json synced from ASM checkout"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm install --package-lock=false

      - name: Build website
        shell: bash
        env:
          AGENT_SKILLS_REPO_DIR: ${{ github.workspace }}/vendor/agent-skills-marketplace
        run: |
          set -euo pipefail
          npm run build

      - name: Deploy production to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          npx --yes wrangler@4.15.2 pages deploy dist \
            --project-name="${CLOUDFLARE_PAGES_PROJECT}" \
            --branch=main
